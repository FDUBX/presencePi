# Configuration détecteur présence -> switch input TV
# Déployée dans /opt/presence_tv/presence_tv.ini (voir install.sh)
# Override possible via env PRESENCE_TV_CONFIG=/chemin/vers.ini

[serial]
# PL011 (ttyAMA0) requis pour 256000 baud stable sur Pi Zero 2W.
# Nécessite dtoverlay=disable-bt (voir config/config.txt.snippet).
port = /dev/ttyAMA0
baud = 256000

[presence]
# Secondes d'absence avant bascule HDMI2
timeout_s = 30
# Période de boucle (~30 Hz)
poll_s = 0.033

[zone]
# Filtrage spatial des cibles (mm, repère LD2450, centre = capteur).
# enabled=false -> toute cible compte.
enabled = false
x_min = -2000
x_max = 2000
y_min = 200
y_max = 4000

[ir]
device = /dev/lirc0
file_hdmi1 = /opt/presence_tv/ir/hdmi1.txt
file_hdmi2 = /opt/presence_tv/ir/hdmi2.txt
# Samsung MU peut exiger 1 ou 2 envois consécutifs
repeat = 2
repeat_gap_s = 0.1

[logging]
level = INFO
